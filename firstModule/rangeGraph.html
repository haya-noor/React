<!doctype html>
<html>
  <head>
    <style>
        body {
          font-family: Arial, sans-serif;
          padding: 40px;
        }
      
        .graph {
          width: 400px;
          display: flex;
          justify-content: space-between;
          border-top: 4px solid black;
          padding-top: 12px;
        }
      
        .peg {
          position: relative;
          font-size: 18px;
        }
      
        .peg::before {
          content: "";
          position: absolute;
          top: -16px;
          left: 50%;
          transform: translateX(-50%);
          width: 4px;
          height: 10px;
          background-color: black;
        }
      </style>
    <title>RangeGraph</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/firstModule/rangeApp.jsx"></script>
  </body>
</html>
